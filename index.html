<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>富士見横丁レトロ</title>
  <!-- PWA対応 -->
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='24' fill='%23c8332a'/%3E%3Ctext x='96' y='140' font-family='serif' font-size='110' font-weight='bold' fill='%23fbf3df' text-anchor='middle'%3E%E4%BC%9A%3C/text%3E%3C/svg%3E">
  <meta name="theme-color" content="#c8332a">
  <style>
    :root {
      --bg: #f5ead4;
      --bg-dark: #2b1d14;
      --paper: #fbf3df;
      --ink: #2b1d14;
      --red: #c8332a;
      --red-dark: #9c241c;
      --green: #3d6b3a;
      --gold: #c89938;
      --line: #d9c7a3;
      --shadow: rgba(43, 29, 20, 0.15);
      --color-warning: #f5a623;
      --color-item-drink: #e8f0e8;
      --color-item-food: #fff8e1;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      overscroll-behavior-y: none;
      background: var(--bg);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "游明朝", serif;
      color: var(--ink);
      font-size: 16px;
    }

    html {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    /* ── VIEWS ── */
    .view {
      display: none;
      flex-direction: column;
      height: 100%;
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      background: var(--bg);
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }

    .view.active {
      display: flex;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--red);
      color: #fff;
      text-align: center;
      padding: 6px 16px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.1em;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-header .session-id {
      position: absolute;
      right: 12px;
      font-size: 10px;
      opacity: 0.7;
      font-weight: 400;
      letter-spacing: 0;
    }

    /* ── STORAGE WARNING ── */
    .storage-warning {
      background: var(--color-warning);
      color: #fff;
      text-align: center;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── DISPLAY BAR (合計金額) ── */
    .display-bar {
      background: var(--paper);
      border-bottom: 2px solid var(--line);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .display-total {
      font-size: 42px;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    /* ── CART TAB（折りたたみ式・グリッドに重ねる） ── */
    .cart-tab-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-dark);
      color: var(--paper);
      padding: 0 12px;
      height: 36px;
      flex-shrink: 0;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      z-index: 25;
    }

    .cart-tab-bar:active {
      background: #3a2a1e;
    }

    .cart-tab-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
    }

    .cart-tab-count {
      background: var(--red);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    .cart-tab-total {
      color: var(--gold);
      font-size: 15px;
      font-weight: 700;
    }

    .cart-tab-arrow {
      font-size: 12px;
      opacity: 0.7;
      transition: transform 0.15s;
    }

    .cart-tab-arrow.open {
      transform: rotate(180deg);
    }

    /* カートドロワー（カートタブバーの下〜アクションバーの上） */
    .cart-drawer {
      position: fixed;
      left: 0;
      right: 0;
      background: var(--paper);
      border-top: 2px solid var(--line);
      border-bottom: 2px solid var(--line);
      z-index: 20;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 4px 16px rgba(43, 29, 20, 0.25);
    }

    .cart-drawer.hidden {
      display: none;
    }

    .cart-item {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      border-bottom: 1px solid var(--line);
      gap: 6px;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cart-item-size {
      font-size: 10px;
      background: var(--gold);
      color: #fff;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .cart-item-price {
      font-size: 12px;
      color: #666;
      flex-shrink: 0;
      min-width: 52px;
      text-align: right;
    }

    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .cart-qty-btn {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      font-size: 16px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      touch-action: manipulation;
    }

    .cart-qty-btn:active {
      background: var(--line);
    }

    .cart-qty-num {
      font-size: 15px;
      font-weight: 700;
      min-width: 22px;
      text-align: center;
    }

    .cart-item-subtotal {
      font-size: 13px;
      font-weight: 700;
      min-width: 58px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── ITEM GRID（商品名ヘッダー＋サイズボタン縦積み・2列） ── */
    .item-grid-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .item-grid-scroll {
      flex: 1;
      overflow: hidden;
      padding: 5px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: 1fr;
      gap: 5px;
      min-height: 0;
    }

    /* 各品目カード（ヘッダー＋サイズボタン縦積み） */
    .item-card {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-height: 0;
    }

    /* 品目名ヘッダー（アイコン＋商品名） */
    .item-card-header {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 2px 5px;
      background: rgba(43, 29, 20, 0.08);
      border-radius: 5px;
      flex-shrink: 0;
      min-height: 22px;
    }

    .item-card-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: #2e6b50;
    }

    .item-card-icon.food-icon {
      color: #7a4f1e;
    }

    .item-card-icon svg {
      width: 100%;
      height: 100%;
    }

    .item-card-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* サイズボタン行 */
    .item-card-btns {
      display: flex;
      flex: 1;
      gap: 3px;
      min-height: 0;
    }

    /* 個別サイズボタン */
    .item-sz-btn {
      flex: 1;
      background: var(--color-item-drink);
      border: 1.5px solid var(--line);
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3px 1px;
      min-height: 0;
      touch-action: manipulation;
      font-family: inherit;
      gap: 1px;
      position: relative;
    }

    .item-sz-btn.food-btn {
      background: var(--color-item-food);
    }

    .item-sz-btn:active {
      animation: itemFlash 0.12s ease-out;
    }

    .item-sz-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--ink);
      opacity: 0.7;
      line-height: 1;
    }

    .item-sz-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
    }

    /* カートバッジ（右上：個数） */
    .item-sz-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      font-family: sans-serif;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
      border: 1.5px solid var(--paper);
      line-height: 1;
      z-index: 2;
    }

    /* マイナスバッジ（左上：−ボタン） */
    .item-sz-badge-minus {
      position: absolute;
      top: -5px;
      left: -5px;
      background: var(--bg-dark);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      font-family: sans-serif;
      width: 20px;
      height: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--paper);
      line-height: 1;
      z-index: 2;
      cursor: pointer;
      touch-action: manipulation;
    }

    .item-sz-badge-minus:active {
      background: var(--red);
    }

    @keyframes itemFlash {
      0% {
        filter: brightness(1);
      }

      40% {
        filter: brightness(1.35);
      }

      100% {
        filter: brightness(1);
      }
    }

    /* ── ACTION BAR ── */
    .action-bar {
      background: var(--bg-dark);
      display: flex;
      gap: 8px;
      padding: 7px 12px;
      flex-shrink: 0;
      position: relative;
      z-index: 25;
    }

    .btn-clear {
      flex: 1;
      background: transparent;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      border-radius: 8px;
      padding: 11px 8px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .btn-clear:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-checkout {
      flex: 2;
      background: var(--green);
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      border-radius: 8px;
      padding: 11px 8px;
      cursor: pointer;
      touch-action: manipulation;
      letter-spacing: 0.05em;
    }

    .btn-checkout:active {
      background: #2d5229;
    }

    .btn-checkout:disabled {
      background: #666;
      color: #aaa;
      cursor: not-allowed;
    }

    /* ── OVERLAY (サイズ選択) ── */
    .overlay-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(43, 29, 20, 0.6);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .overlay-bg.open {
      display: flex;
    }

    .overlay-sheet {
      background: var(--paper);
      border-radius: 16px 16px 0 0;
      padding: 20px 16px calc(20px + var(--safe-bottom));
      width: 100%;
      max-width: 480px;
    }

    .overlay-title {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 16px;
      color: var(--ink);
    }

    .size-btn-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .size-btn {
      background: var(--paper);
      border: 2px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      touch-action: manipulation;
      font-family: inherit;
    }

    .size-btn:active {
      background: var(--line);
    }

    .size-btn-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
    }

    .size-btn-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--red);
    }

    .btn-cancel {
      margin-top: 12px;
      width: 100%;
      background: transparent;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      color: #888;
      cursor: pointer;
      touch-action: manipulation;
    }

    .btn-cancel:active {
      background: var(--line);
    }

    /* ── CHECKOUT MODAL ── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(43, 29, 20, 0.6);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-bg.open {
      display: flex;
    }

    .modal-sheet {
      background: var(--paper);
      border-radius: 16px 16px 0 0;
      padding: 16px 16px calc(12px + var(--safe-bottom));
      width: 100%;
      max-width: 480px;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
      color: var(--ink);
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    /* 合計金額 + お釣り を横並び */
    .modal-amounts {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }

    .modal-amount-block {
      flex: 1;
      text-align: center;
    }

    .modal-amount-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 2px;
    }

    .modal-total-amount {
      font-size: 28px;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
    }

    /* お預かり表示（テンキー入力値） */
    .modal-received-display {
      font-size: 28px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
      min-height: 34px;
    }

    .modal-received-display.empty {
      color: #bbb;
    }

    .change-amount {
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .change-amount.shortage {
      color: var(--red);
      font-size: 22px;
    }

    /* 紙幣クイックボタン */
    .bill-btns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin-bottom: 8px;
    }

    .bill-btn {
      background: var(--bg-dark);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 4px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
      text-align: center;
    }

    .bill-btn:active {
      background: #444;
    }

    /* テンキーパッド（3列×4行） */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      margin-bottom: 8px;
    }

    .numpad-btn {
      background: var(--paper);
      border: 1.5px solid var(--line);
      border-radius: 8px;
      padding: 16px 4px;
      font-size: 22px;
      font-weight: 700;
      font-family: inherit;
      color: var(--ink);
      cursor: pointer;
      touch-action: manipulation;
      text-align: center;
    }

    .numpad-btn:active {
      background: var(--line);
    }

    .numpad-btn.numpad-del {
      background: var(--bg);
      color: var(--red);
      font-size: 24px;
    }

    .numpad-btn.numpad-del:active {
      background: var(--line);
    }

    .numpad-btn.numpad-clear {
      background: var(--bg);
      color: var(--red);
      font-size: 16px;
      font-weight: 700;
    }

    .numpad-btn.numpad-clear:active {
      background: var(--red);
      color: #fff;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .btn-modal-confirm {
      flex: 1;
      width: 100%;
      background: var(--red);
      border: none;
      border-radius: 10px;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      font-family: inherit;
      color: #fff;
      cursor: pointer;
      touch-action: manipulation;
      letter-spacing: 0.05em;
    }

    .btn-modal-confirm:active {
      background: var(--red-dark);
    }

    .btn-modal-confirm:disabled {
      background: #ccc;
      color: #999;
      cursor: not-allowed;
    }

    /* ── SALES VIEW ── */
    #app-sales {
      overflow: hidden;
    }

    .sales-header {
      background: var(--bg-dark);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      flex-shrink: 0;
      min-height: 48px;
    }

    .sales-header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    .btn-close-sales {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    .btn-close-sales:active {
      background: rgba(255, 255, 255, 0.3);
    }

    .sales-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }

    .sales-total-card {
      background: var(--paper);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid var(--line);
      box-shadow: 0 2px 8px var(--shadow);
    }

    .sales-total-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 4px;
    }

    .sales-total-amount {
      font-size: 44px;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
    }

    .sales-total-count {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .sales-section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 2px solid var(--line);
    }

    .sales-card {
      background: var(--paper);
      border-radius: 10px;
      border: 1px solid var(--line);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .item-stat-row {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      gap: 8px;
    }

    .item-stat-row:last-child {
      border-bottom: none;
    }

    .item-stat-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
    }

    .item-stat-size {
      font-size: 10px;
      background: var(--gold);
      color: #fff;
      padding: 1px 5px;
      border-radius: 3px;
    }

    .item-stat-qty {
      font-size: 13px;
      font-weight: 700;
      min-width: 36px;
      text-align: right;
    }

    .item-stat-amount {
      font-size: 13px;
      font-weight: 700;
      color: var(--red);
      min-width: 72px;
      text-align: right;
    }

    .tx-row {
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
    }

    .tx-row:last-child {
      border-bottom: none;
    }

    .tx-row-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }

    .tx-time {
      font-size: 11px;
      color: #888;
    }

    .tx-total {
      font-size: 14px;
      font-weight: 700;
      color: var(--red);
    }

    .tx-items {

    function generateSessionId() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'
      let result = ''
      for (let i = 0; i < 6; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length))
      }
      return result
    }

    // YYYYMMDD形式
    function formatDate(d) {
      const y = d.getFullYear()
      const m = String(d.getMonth() + 1).padStart(2, '0')
      const day = String(d.getDate()).padStart(2, '0')
      return `${y}${m}${day}`
    }

    // HHMMSS形式
    function formatTime(d) {
      const h = String(d.getHours()).padStart(2, '0')
      const min = String(d.getMinutes()).padStart(2, '0')
      const s = String(d.getSeconds()).padStart(2, '0')
      return `${h}${min}${s}`
    }

    // TransactionID生成: {SessionID}_{YYYYMMDD}_{HHMMSS}_{連番4桁}
    function generateTransactionId(sessionId, date, counter) {
      return `${sessionId}_${formatDate(date)}_${formatTime(date)}_${String(counter).padStart(4, '0')}`
    }

     * @param {string} sizeLabel - サイズ表示名
     * @param {number} price - 単価
     * @returns {Array} 新しいカート（イミュータブル）
     */
    function addToCart(cart, itemId, name, size, sizeLabel, price) {
      const existing = cart.find(item => item.itemId === itemId && item.size === size)
      if (existing) {
        return cart.map(item =>
          item.itemId === itemId && item.size === size
            ? { ...item, quantity: item.quantity + 1 }
            : item
        )
      }
      return [...cart, { itemId, name, size, sizeLabel, price, quantity: 1 }]

    function updateCartQty(cart, itemId, size, delta) {
      return cart
        .map(item =>

            ? { ...item, quantity: item.quantity + delta }
            : item
        )
        .filter(item => item.quantity > 0)

     * @param {Array} cart - カート

     */
    function getCartTotal(cart) {
      return cart.reduce((sum, item) => sum + item.price * item.quantity, 0)
    }

    // ── 会計処理・お釣り計算 ──────────────────────────────

    /**
     * お釣りを計算する
     * @param {number} received - お預かり金額
     * @param {number} total - 合計金額
     * @returns {number} お釣り（負の場合は不足）
     */
    function calcChange(received, total) {
      return received - total
    }

    /**
     * 会計を確定してTransactionを生成する（副作用なし）
     * @param {Array} cart - カート
     * @param {string} sessionId - セッションID
     * @param {Date} date - 会計日時
     * @param {number} counter - 連番カウンター
     * @returns {{ transaction: Transaction, newCart: Array, newCounter: number }}
     */
    function confirmCheckout(cart, sessionId, date, counter) {
      const newCounter = counter + 1
      const id = generateTransactionId(sessionId, date, newCounter)
      const items = cart.map(item => ({
        itemId: item.itemId,
        name: item.name,
        size: item.size,
        sizeLabel: item.sizeLabel,
        price: item.price,
        quantity: item.quantity,
        subtotal: item.price * item.quantity,
      }))
      const total = getCartTotal(cart)
      const transaction = {
        id,
        sessionId,
        timestamp: date.toISOString(),
        dateKey: formatDate(date),
        items,
        total,
      }
      return { transaction, newCart: [], newCounter }
    }

    // ── LocalStorage I/O ──────────────────────────────────

    /**
     * LocalStorageから状態を復元する
     * @param {Storage} storage - localStorage オブジェクト（テスト時はモック）
     * @returns {{ sessionId: string, transactions: Array, dateKey: string, seqCounter: number }}
     */
    function loadState(storage) {
      try {
        const today = todayKey()
        const savedDateKey = storage.getItem(STORAGE_KEYS.DATE_KEY)

        // 日付が変わっていたら当日データをクリア
        if (savedDateKey !== today) {
          storage.setItem(STORAGE_KEYS.DATE_KEY, today)
          storage.setItem(STORAGE_KEYS.TRANSACTIONS, '[]')
          storage.setItem(STORAGE_KEYS.SEQ_COUNTER, '0')
        }

        // SessionIDを取得または生成
        let sessionId = storage.getItem(STORAGE_KEYS.SESSION_ID)
        if (!sessionId) {
          sessionId = generateSessionId()
          storage.setItem(STORAGE_KEYS.SESSION_ID, sessionId)
        }

        // Transactionデータを復元
        let transactions = []
        try {
          const raw = storage.getItem(STORAGE_KEYS.TRANSACTIONS)
          const parsed = JSON.parse(raw || '[]')
          transactions = Array.isArray(parsed) ? parsed : []
        } catch {
          transactions = []
          storage.setItem(STORAGE_KEYS.TRANSACTIONS, '[]')
        }

        const seqCounter = parseInt(storage.getItem(STORAGE_KEYS.SEQ_COUNTER) || '0', 10)

        return { sessionId, transactions, dateKey: today, seqCounter }
      } catch (e) {
        // LocalStorageアクセス失敗時は空の状態で起動
        return {
          sessionId: generateSessionId(),
          transactions: [],
          dateKey: todayKey(),
          seqCounter: 0,
        }
      }
    }

    /**
     * 状態をLocalStorageに保存する
     * @param {Storage} storage - localStorage オブジェクト
     * @param {{ sessionId: string, transactions: Array, seqCounter: number }} state
     * @returns {{ success: boolean, error?: Error }}
     */
    function saveState(storage, state) {
      try {
        storage.setItem(STORAGE_KEYS.SESSION_ID, state.sessionId)
        storage.setItem(STORAGE_KEYS.TRANSACTIONS, JSON.stringify(state.transactions))
        storage.setItem(STORAGE_KEYS.DATE_KEY, todayKey())
        storage.setItem(STORAGE_KEYS.SEQ_COUNTER, String(state.seqCounter))
        return { success: true }
      } catch (e) {
        return { success: false, error: e }
      }
    }

    /**
     * LocalStorageの使用容量を確認する（80%超過でwarning）
     * @param {Storage} storage - localStorage オブジェクト
     * @returns {Promise<{ ratio: number, warning: boolean }>}
     */
    async function checkStorageUsage(storage) {
      try {
        // navigator.storage.estimate() が使える場合
        if (typeof navigator !== 'undefined' && navigator.storage && navigator.storage.estimate) {
          const { usage, quota } = await navigator.storage.estimate()
          const ratio = quota > 0 ? usage / quota : 0
          return { ratio, warning: ratio >= STORAGE_WARNING_RATIO }
        }
        // フォールバック: 保存データサイズで試算
        let totalSize = 0
        for (const key of Object.values(STORAGE_KEYS)) {
          const val = storage.getItem(key)
          if (val) totalSize += val.length * 2 // UTF-16 = 2 bytes/char
        }
        const estimatedQuota = 5 * 1024 * 1024 // 5MB
        const ratio = totalSize / estimatedQuota
        return { ratio, warning: ratio >= STORAGE_WARNING_RATIO }
      } catch {
        return { ratio: 0, warning: false }
      }
    }

    // ── エクスポート・インポート ───────────────────────────

    /**
     * エクスポートデータ（JSON文字列）を生成する
     * @param {string} sessionId
     * @param {Array} transactions
     * @returns {string} JSON文字列
     */
    function exportData(sessionId, transactions) {
      const exportObj = {
        version: '1.0',
        exportedAt: new Date().toISOString(),
        sessionId,
        dateKey: todayKey(),
        transactions,
      }
      return JSON.stringify(exportObj, null, 2)
    }

    /**
     * インポートデータをパースして既存Transactionとマージする（重複IDはスキップ）
     * @param {string} jsonText - インポートするJSON文字列
     * @param {Array} existingTransactions - 既存のTransaction配列
     * @returns {{ transactions: Array, added: number, skipped: number, error?: string }}
     */
    function importData(jsonText, existingTransactions) {
      let parsed
      try {
        parsed = JSON.parse(jsonText)
      } catch {
        return { transactions: existingTransactions, added: 0, skipped: 0, error: 'JSONの形式が正しくありません' }
      }

      if (!parsed || !Array.isArray(parsed.transactions)) {
        return { transactions: existingTransactions, added: 0, skipped: 0, error: 'データ形式が不正です（transactionsフィールドが見つかりません）' }
      }

      const existingIds = new Set(existingTransactions.map(t => t.id))
      let added = 0
      let skipped = 0
      const newTransactions = [...existingTransactions]

      for (const tx of parsed.transactions) {
        if (!tx.id) { skipped++; continue }
        if (existingIds.has(tx.id)) {
          skipped++
        } else {
          newTransactions.push(tx)
          existingIds.add(tx.id)
          added++
        }
      }

      return { transactions: newTransactions, added, skipped }
    }

    /**
     * エクスポート後にリセットした新しい状態を返す
     * @param {object} currentState
     * @returns {object} リセット後の新しい状態
     */
    function resetAfterExport(currentState) {
      return {
        ...currentState,
        sessionId: generateSessionId(),
        transactions: [],
        seqCounter: 0,
      }
    }

    // ── 売上集計 ──────────────────────────────────────────

    /**
     * 当日のTransactionのみを返す
     * @param {Array} transactions
     * @returns {Array}
     */
    function getTodayTransactions(transactions) {
      const today = todayKey()
      return transactions.filter(t => t.dateKey === today)
    }

    /**
     * 当日の売上集計を返す
     * @param {Array} transactions
     * @returns {{ total: number, itemStats: Array<{ itemId, name, sizeLabel, quantity, amount }> }}
     */
    function getDailySummary(transactions) {
      const todayTx = getTodayTransactions(transactions)
      const total = todayTx.reduce((sum, t) => sum + t.total, 0)

      // 品目別集計
      const statsMap = {}
      for (const tx of todayTx) {
        for (const item of tx.items) {
          const key = `${item.itemId}_${item.size}`
          if (!statsMap[key]) {
            statsMap[key] = { itemId: item.itemId, name: item.name, size: item.size, sizeLabel: item.sizeLabel, quantity: 0, amount: 0 }
          }
          statsMap[key].quantity += item.quantity
          statsMap[key].amount += item.subtotal
        }
      }

      const itemStats = Object.values(statsMap).sort((a, b) => b.amount - a.amount)
      return { total, itemStats }
    }

    function formatPrice(n) {

    let _toastTimer = null
    function showToast(message, type) {
      const toast = document.getElementById('toast')
      if (!toast) return
      if (_toastTimer) clearTimeout(_toastTimer)
      toast.textContent = message
      toast.className = type || ''
      toast.classList.add('show')
      const duration = (type === 'success') ? 800 : 3000
      _toastTimer = setTimeout(() => {
        toast.classList.remove('show')
      }, duration)
    }

    // ============================================================
    // persist / render
    // ============================================================
    function persist() {
      const result = saveState(localStorage, {
        sessionId: AppState.sessionId,
        transactions: AppState.transactions,
        seqCounter: AppState.seqCounter,
      })
      // LocalStorageが使えない環境（file://等）では静かに失敗
      if (!result.success) {
        console.warn('LocalStorage save failed:', result.error)
      }
      checkStorageUsage(localStorage).then(({ warning }) => {
        AppState.storageWarning = warning
        const banner = document.getElementById('storage-warning')
        if (banner) banner.style.display = warning ? 'block' : 'none'
      }).catch(() => { })
    }

      if (AppState.currentView === 'order') {
        document.getElementById('app-order').classList.add('active')
        document.getElementById('app-sales').classList.remove('active')
        renderOrderView()
      } else {
        document.getElementById('app-order').classList.remove('active')

      }
    }

    function renderCart() {
      // カートタブバーを更新
      const total = getCartTotal(AppState.cart)
      const itemCount = AppState.cart.reduce((s, i) => s + i.quantity, 0)
      const countEl = document.getElementById('cart-tab-count')
      const totalEl2 = document.getElementById('cart-tab-total')
      const arrowEl = document.getElementById('cart-tab-arrow')
      if (countEl) countEl.textContent = itemCount
      if (totalEl2) totalEl2.textContent = formatPrice(total)
      if (arrowEl) {
        arrowEl.textContent = AppState.cartDrawerOpen ? '▼' : '▲'

      }

      if (!drawer) return

      drawer.classList.remove('hidden')

      if (AppState.cart.length === 0) {

        return

      const rows = AppState.cart.map(item => {

          '<span class="cart-qty-num">' + item.quantity + '</span>' +
          '<button class="cart-qty-btn" onclick="handleCartQty(&apos;' + item.itemId + '&apos;,&apos;' + item.size + '&apos;,1)" aria-label="増やす">+</button>' +

      const total = getCartTotal(AppState.cart)
      const received = AppState.receivedAmount
      const changeEl = document.getElementById('change-display')
      const confirmBtn = document.getElementById('btn-confirm')
      const receivedDisplay = document.getElementById('modal-received-display')

      // お預かり表示
      if (receivedDisplay) {
        if (received === 0) {
          receivedDisplay.textContent = '—'
          receivedDisplay.className = 'modal-received-display empty'
        } else {
          receivedDisplay.textContent = formatPrice(received)
          receivedDisplay.className = 'modal-received-display'
        }
      }

      if (!changeEl) return

      if (received === 0) {
        changeEl.textContent = '—'
        changeEl.className = 'change-amount'
        if (confirmBtn) confirmBtn.disabled = true
        return
      }

      const change = calcChange(received, total)
      if (change < 0) {
        changeEl.textContent = '不足 ' + formatPrice(-change)
        changeEl.className = 'change-amount shortage'
        if (confirmBtn) confirmBtn.disabled = true
      } else {
        changeEl.textContent = formatPrice(change)
        changeEl.className = 'change-amount'
        if (confirmBtn) confirmBtn.disabled = false
      }
    }

    function setReceived(amount) {
      AppState.receivedAmount = amount
      updateChangeDisplay()
    }

    function addReceived(amount) {
      AppState.receivedAmount += amount
      updateChangeDisplay()
    }

    function setExact() {
      AppState.receivedAmount = getCartTotal(AppState.cart)
      updateChangeDisplay()
    }

    // テンキーパッド入力
    function numpadInput(digit) {
      const current = String(AppState.receivedAmount === 0 ? '' : AppState.receivedAmount)
      const next = current + digit
      const val = parseInt(next, 10)
      if (!isNaN(val) && val <= 9999999) {
        AppState.receivedAmount = val
        updateChangeDisplay()
      }
    }

    // テンキーパッド削除
    function numpadDelete() {
      const current = String(AppState.receivedAmount)
      if (current.length <= 1) {
        AppState.receivedAmount = 0
      } else {
        AppState.receivedAmount = parseInt(current.slice(0, -1), 10)
      }
      updateChangeDisplay()
    }

    // テンキーパッド全クリア
    function numpadClear() {
      AppState.receivedAmount = 0
      updateChangeDisplay()
    }

    function handleReceivedInput(val) {
      const n = parseInt(val.replace(/[^0-9]/g, ''), 10)
      AppState.receivedAmount = isNaN(n) ? 0 : n
      updateChangeDisplay()
    }

    function handleModalBgClick(e) {
      if (e.target === document.getElementById('modal-checkout')) {
        closeCheckoutModal()
      }
    }

    // ============================================================
    // Event Handlers
    // ============================================================
    function handleItemTap(itemId) {
      const item = ITEM_MASTER.find(i => i.id === itemId)
      if (!item) return
      if (item.sizes.length === 1) {
        AppState.cart = addToCart(AppState.cart, item.id, item.name, item.sizes[0].size, item.sizes[0].label, item.sizes[0].price)
        persist()
        render()
      } else {
        renderSizeOverlay(item)
      }
    }

    // サイズ直接タップ（グリッドUI用）
    function handleSizeDirectTap(itemId, size, sizeLabel, price) {
      const item = ITEM_MASTER.find(i => i.id === itemId)
      if (!item) return
      AppState.cart = addToCart(AppState.cart, itemId, item.name, size, sizeLabel, price)
      persist()
      // カート・合計・バッジを更新
      renderCart()
      renderItemGrid()
      const total = getCartTotal(AppState.cart)
      const totalEl = document.getElementById('display-total')
      if (totalEl) totalEl.textContent = formatPrice(total)
      const btnCheckout = document.getElementById('btn-checkout')
      if (btnCheckout) btnCheckout.style.display = AppState.cart.length === 0 ? 'none' : 'block'
    }

    function handleSizeSelect(itemId, size, sizeLabel, price) {
      const item = ITEM_MASTER.find(i => i.id === itemId)
      if (!item) return
      AppState.cart = addToCart(AppState.cart, itemId, item.name, size, sizeLabel, price)
      closeSizeOverlay()
      persist()
      render()
    }

    function handleCartQty(itemId, size, delta) {
      AppState.cart = updateCartQty(AppState.cart, itemId, size, delta)
      persist()
      render()
    }

    function handleTitleTap() {
      AppState.titleTapCount++
      if (AppState.titleTapTimer) clearTimeout(AppState.titleTapTimer)
      AppState.titleTapTimer = setTimeout(() => { AppState.titleTapCount = 0 }, 5000)
      if (AppState.titleTapCount >= 5) {
        AppState.titleTapCount = 0
        AppState.currentView = 'sales'
        render()
      }
    }

    function handleClearCart() {
      if (AppState.cart.length === 0) return
      AppState.cart = clearCart()
      persist()
      render()
    }

    function handleCheckout() {
      if (AppState.cart.length === 0) return
      AppState.checkoutModalOpen = true
      AppState.receivedAmount = 0
      openCheckoutModal()
    }

    function handleConfirmCheckout() {
      const total = getCartTotal(AppState.cart)
      if (AppState.receivedAmount < total) return
      const { transaction, newCart, newCounter } = confirmCheckout(
        AppState.cart, AppState.sessionId, new Date(), AppState.seqCounter
      )
      AppState.transactions.push(transaction)
      AppState.cart = newCart
      AppState.seqCounter = newCounter
      AppState.checkoutModalOpen = false
      AppState.receivedAmount = 0
      closeCheckoutModal()
      persist()
      render()
      showToast('\u4f1a\u8a08\u5b8c\u4e86\uff01', 'success')
    }

    function handleCloseSales() {
      AppState.currentView = 'order'
      render()
    }

    function toggleImportArea() {
      const area = document.getElementById('import-area')
      if (!area) return
      area.style.display = area.style.display === 'none' ? 'block' : 'none'
    }

    async function handleExport() {
      const json = exportData(AppState.sessionId, AppState.transactions)
      try {
        await navigator.clipboard.writeText(json)
        showToast('\u30b3\u30d4\u30fc\u3057\u307e\u3057\u305f\u3002LINE\u306a\u3069\u3067\u96c6\u8a08\u62c5\u5f53\u8005\u306b\u9001\u3063\u3066\u304f\u3060\u3055\u3044\u3002', 'success')
      } catch {
        const area = document.getElementById('export-fallback-area')
        const ta = document.getElementById('export-fallback')
        if (area) area.style.display = 'block'
        if (ta) { ta.value = json; ta.select() }
        showToast('\u624b\u52d5\u3067\u30b3\u30d4\u30fc\u3057\u3066\u304f\u3060\u3055\u3044', 'warning')
        return
      }
      if (confirm('\u3053\u306e\u30c7\u30fc\u30bf\u3092\u30ea\u30bb\u30c3\u30c8\u3057\u307e\u3059\u304b\uff1f')) {
        const newState = resetAfterExport(AppState)
        AppState.sessionId = newState.sessionId
        AppState.transactions = newState.transactions
        AppState.seqCounter = newState.seqCounter
        persist()
        render()
        showToast('\u30ea\u30bb\u30c3\u30c8\u3057\u307e\u3057\u305f', 'success')
      }
    }

    function handleImport() {
      const ta = document.getElementById('import-textarea')
      if (!ta) return
      const json = ta.value.trim()
      if (!json) { showToast('\u30c7\u30fc\u30bf\u3092\u8cbc\u308a\u4ed8\u3051\u3066\u304f\u3060\u3055\u3044', 'warning'); return }
      const result = importData(json, AppState.transactions)
      if (result.error) { showToast(result.error, 'error'); return }
      AppState.transactions = result.transactions
      ta.value = ''
      persist()
      render()
      showToast(result.added + '\u4ef6\u53d6\u308a\u8fbc\u307f\u307e\u3057\u305f\u3002' + result.skipped + '\u4ef6\u306f\u30b9\u30ad\u30c3\u30d7\u3057\u307e\u3057\u305f\u3002', 'success')
    }

    function handleReset() {
      if (!confirm('本日のデータをリセットしますか？この操作は取り消せません。')) return
      if (!confirm('本当にリセットしますか？')) return
      AppState.transactions = []
      AppState.cart = clearCart()
      AppState.sessionId = generateSessionId()
      AppState.seqCounter = 0
      AppState.currentView = 'order'
      AppState.deleteMode = false
      persist()
      render()
      showToast('リセットしました', 'success')
    }

    function toggleDeleteMode() {
      AppState.deleteMode = !AppState.deleteMode
      renderSalesView()
    }

    function toggleTxHistory() {
      AppState.txHistoryOpen = !AppState.txHistoryOpen
      renderSalesView()
    }

    function handleDeleteTransaction(txId) {
      if (!confirm('この取引を削除しますか？')) return
      AppState.transactions = AppState.transactions.filter(t => t.id !== txId)
      persist()
      renderSalesView()
      showToast('取引を削除しました', 'success')
    }

    // ============================================================
    // 起動処理
    // ============================================================
    try {
      const saved = loadState(localStorage)
      AppState.sessionId = saved.sessionId || generateSessionId()
      AppState.transactions = Array.isArray(saved.transactions) ? saved.transactions : []
      AppState.seqCounter = typeof saved.seqCounter === 'number' ? saved.seqCounter : 0
    } catch (e) {
      AppState.sessionId = generateSessionId()
      AppState.transactions = []
      AppState.seqCounter = 0
    }
    render()

    // ヘッダー以外タップでタイトルタップカウントをリセット
    document.addEventListener('click', function (e) {
      const header = document.getElementById('order-header')
      if (header && !header.contains(e.target)) {
        if (AppState.titleTapCount > 0) {
          AppState.titleTapCount = 0
          if (AppState.titleTapTimer) {
            clearTimeout(AppState.titleTapTimer)
            AppState.titleTapTimer = null
          }
        }
      }
    }, true)

    // Service Worker 登録（PWAオフライン対応）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => { })
    }
  </script>
</body>

</html>

name: Update SW Cache Version on Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CACHE_NAME with timestamp
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          sed -i "s/const CACHE_NAME = 'fujimi-yokocho-[^']*'/const CACHE_NAME = 'fujimi-yokocho-${TIMESTAMP}'/" sw.js
          echo "Updated CACHE_NAME to fujimi-yokocho-${TIMESTAMP}"
          cat sw.js | grep CACHE_NAME

      - name: Commit updated sw.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet && echo "No changes" || git commit -m "chore: update SW cache version [skip ci]"
          git diff --staged --quiet || git push

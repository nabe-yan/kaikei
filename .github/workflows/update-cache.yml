日毎name: Update SW Cache Version on Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CACHE_NAME with timestamp
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          # CACHE_NAME の値（シングルクォート内）をタイムスタンプに置換
          sed -i "s/const CACHE_NAME = '[^']*'/const CACHE_NAME = 'fujimi-yokocho-${TIMESTAMP}'/" sw.js
          echo "Updated CACHE_NAME:"
          grep CACHE_NAME sw.js | head -1

      - name: Commit updated sw.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "chore: update SW cache version [skip ci]" && git push)
